<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1e293b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CleanSlate">
  <title>CleanSlate</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --shadow:  0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
      --radius:  14px;
      --slate:   #1e293b;
      --chalk:   #f8fafc;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0f172a;
        --surface: #1e293b;
        --text:    #f1f5f9;
        --muted:   #94a3b8;
        --border:  #334155;
        --shadow:  0 1px 4px rgba(0,0,0,.3), 0 2px 10px rgba(0,0,0,.2);
      }
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ────────────────────────────────────────── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--slate);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #app-header h1 {
      flex: 1;
      font-size: 20px;
      font-weight: 800;
      color: var(--chalk);
      letter-spacing: -0.3px;
    }
    #app-header h1 span { opacity: 0.45; font-weight: 400; font-size: 14px; margin-left: 2px; }
    .hdr-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--chalk);
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Search + filter area ──────────────────────────── */
    #controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px 0;
      position: sticky;
      top: calc(44px + var(--safe-top));
      z-index: 40;
    }
    #search-input {
      width: 100%;
      padding: 9px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: #64748b; }

    /* ── Filter + sort row ─────────────────────────────── */
    #filter-sort-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 10px;
    }
    #filter-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
      padding-bottom: 2px;
    }
    #filter-pills::-webkit-scrollbar { display: none; }
    .filter-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      transition: all .15s;
      flex-shrink: 0;
    }
    .filter-pill .pill-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-pill.active {
      color: white;
      border-color: transparent;
    }
    .sort-btn {
      flex-shrink: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Card list ─────────────────────────────────────── */
    #cards-list {
      padding: 10px 16px calc(80px + var(--safe-bot));
      display: grid;
      gap: 10px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-msg  { font-size: 14px; line-height: 1.6; }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      -webkit-user-select: none;
      user-select: none;
    }
    .card:active { transform: scale(0.976); box-shadow: none; }
    .card-bar   { height: 5px; }
    .card-body  { padding: 11px 14px 10px; }
    .card-title {
      font-size: 15px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .card-preview {
      font-size: 13px;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 9px;
    }
    .card-label-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      color: white;
    }
    .card-date  { font-size: 11px; color: var(--muted); flex: 1; text-align: right; }
    .card-thumbs { display: flex; gap: 4px; }
    .card-thumb {
      width: 30px; height: 30px;
      object-fit: cover;
      border-radius: 5px;
    }

    /* ── FAB ───────────────────────────────────────────── */
    #fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bot));
      right: 22px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--slate);
      color: var(--chalk);
      border: none;
      font-size: 32px;
      line-height: 1;
      box-shadow: 0 4px 16px rgba(15,23,42,.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform .15s;
    }
    #fab:active { transform: scale(0.88); }

    /* ── Modal ─────────────────────────────────────────── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .modal.open { transform: translateY(0); }

    /* ── Editor header ─────────────────────────────────── */
    #editor-header {
      background: var(--slate);
      padding: calc(10px + var(--safe-top)) 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--chalk);
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      opacity: 0.8;
    }
    #editor-label { flex: 1; font-size: 15px; font-weight: 700; color: var(--chalk); }
    .btn-outline {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 9px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--chalk);
      cursor: pointer;
    }
    .btn-chalk {
      background: var(--chalk);
      border: none;
      border-radius: 9px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--slate);
      cursor: pointer;
    }

    /* ── Editor body ───────────────────────────────────── */
    #editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overscroll-behavior: contain;
    }

    /* ── Label selector ────────────────────────────────── */
    .label-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .label-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 4px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .12s;
      color: white;
      opacity: 0.65;
    }
    .label-chip.active {
      opacity: 1;
      border-color: var(--text);
      transform: scale(1.04);
    }
    .label-chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    /* ── Title input ───────────────────────────────────── */
    #note-title {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0;
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      outline: none;
    }
    #note-title::placeholder { color: var(--muted); font-weight: 400; }

    /* ── Markdown toolbar ──────────────────────────────── */
    #md-toolbar {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    #md-toolbar button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    /* ── Content textarea ──────────────────────────────── */
    #note-content {
      width: 100%;
      min-height: 180px;
      background: none;
      border: none;
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--text);
      outline: none;
      resize: none;
      font-family: 'Courier New', Courier, monospace;
    }
    #note-content::placeholder { color: var(--muted); font-family: inherit; }

    /* ── Markdown render ───────────────────────────────── */
    .md-render {
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--text);
    }
    .md-render h1 { font-size: 22px; font-weight: 800; margin: 6px 0 10px; }
    .md-render h2 { font-size: 18px; font-weight: 700; margin: 6px 0 8px; }
    .md-render h3 { font-size: 15px; font-weight: 700; margin: 6px 0 6px; }
    .md-render p  { margin-bottom: 10px; }
    .md-render ul, .md-render ol { margin: 0 0 10px 22px; }
    .md-render li { margin-bottom: 3px; }
    .md-render code { background: var(--border); padding: 1px 6px; border-radius: 4px; font-size: 13px; font-family: 'Courier New', monospace; }
    .md-render pre { background: var(--border); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 10px; }
    .md-render pre code { background: none; padding: 0; }
    .md-render blockquote { border-left: 3px solid #64748b; padding-left: 14px; color: var(--muted); margin-bottom: 10px; }
    .md-render a { color: #3b82f6; }
    .md-render hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .md-render img { max-width: 100%; border-radius: 10px; margin: 6px 0; }
    .md-render strong { font-weight: 700; }
    .md-render em { font-style: italic; }
    .md-render table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
    .md-render th, .md-render td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
    .md-render th { background: var(--border); font-weight: 700; }

    /* ── Image toolbar ─────────────────────────────────── */
    #img-toolbar { display: flex; gap: 8px; }
    .img-btn {
      flex: 1;
      padding: 9px 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
    }

    /* ── Editor image grid ─────────────────────────────── */
    #editor-images { display: flex; flex-wrap: wrap; gap: 8px; }
    .eimg-wrap { position: relative; }
    .eimg-wrap img { width: 76px; height: 76px; object-fit: cover; border-radius: 9px; display: block; }
    .eimg-del {
      position: absolute; top: -7px; right: -7px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── View modal ────────────────────────────────────── */
    #view-modal .view-bar { height: 5px; }
    #view-modal .view-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--slate);
    }
    #view-title { flex: 1; font-size: 16px; font-weight: 700; color: var(--chalk); }
    .btn-view-edit {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 9px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--chalk);
      cursor: pointer;
    }
    .btn-view-del {
      background: none;
      border: 1px solid #ef4444;
      border-radius: 9px;
      padding: 5px 12px;
      font-size: 13px;
      color: #ef4444;
      cursor: pointer;
    }
    #view-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overscroll-behavior: contain;
    }
    #view-date { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

<!-- ── App Header ──────────────────────────────────────── -->
<header id="app-header">
  <h1>CleanSlate</h1>
  <button class="hdr-btn" onclick="exportMarkdown()">⬇ Export</button>
</header>

<!-- ── Search + Filter ────────────────────────────────── -->
<div id="controls">
  <input id="search-input" type="search" placeholder="Search notes…" autocomplete="off" oninput="renderCards()">
  <div id="filter-sort-row">
    <div id="filter-pills"></div>
    <button class="sort-btn" id="sort-btn" onclick="cycleSort()">↓ Newest</button>
  </div>
</div>

<!-- ── Cards ──────────────────────────────────────────── -->
<div id="cards-list"></div>

<!-- ── FAB ────────────────────────────────────────────── -->
<button id="fab" onclick="openEditor()" title="New note">＋</button>

<!-- ── Edit Modal ─────────────────────────────────────── -->
<div class="modal" id="editor-modal">
  <div id="editor-header">
    <button class="icon-btn" onclick="closeEditor()">←</button>
    <span id="editor-label">New Note</span>
    <button class="btn-outline" id="preview-btn" onclick="togglePreview()">Preview</button>
    <button class="btn-chalk" onclick="saveNote()">Save</button>
  </div>
  <div id="editor-body">

    <!-- Label grid -->
    <div id="label-grid" class="label-grid"></div>

    <!-- Title -->
    <input id="note-title" type="text" placeholder="Title (optional)">

    <!-- Markdown toolbar -->
    <div id="md-toolbar">
      <button onclick="insertMd('**','**')" title="Bold">B</button>
      <button onclick="insertMd('*','*')" title="Italic"><em>i</em></button>
      <button onclick="insertMd('~~','~~')" title="Strikethrough"><s>S</s></button>
      <button onclick="insertMd('\n# ','')" title="Heading 1">H1</button>
      <button onclick="insertMd('\n## ','')" title="Heading 2">H2</button>
      <button onclick="insertMd('\n### ','')" title="Heading 3">H3</button>
      <button onclick="insertMd('\n- ','')" title="Bullet list">•</button>
      <button onclick="insertMd('\n1. ','')" title="Numbered list">1.</button>
      <button onclick="insertMd('\n> ','')" title="Quote">❝</button>
      <button onclick="insertMd('`','`')" title="Inline code">&#96;&#96;</button>
      <button onclick="insertMd('\n```\n','\n```')" title="Code block">{ }</button>
      <button onclick="insertMd('[','](url)')" title="Link">🔗</button>
      <button onclick="insertMd('\n---\n','')" title="Divider">—</button>
    </div>

    <!-- Textarea -->
    <textarea id="note-content"
      placeholder="Write in Markdown…&#10;&#10;**bold**  *italic*  ~~strikethrough~~&#10;# Heading  ## Subheading&#10;- list item&#10;1. numbered&#10;> blockquote&#10;`code`"></textarea>

    <!-- Markdown preview -->
    <div class="md-render" id="md-preview" style="display:none"></div>

    <!-- Image toolbar -->
    <div id="img-toolbar">
      <button class="img-btn" onclick="document.getElementById('file-input').click()">📁 File</button>
      <button class="img-btn" onclick="document.getElementById('cam-input').click()">📷 Camera</button>
      <button class="img-btn" onclick="pasteClipboard()">📋 Paste</button>
    </div>
    <input id="file-input" type="file" accept="image/*"                   style="display:none" onchange="handleFile(event)">
    <input id="cam-input"  type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">

    <!-- Attached images -->
    <div id="editor-images"></div>
  </div>
</div>

<!-- ── View Modal ──────────────────────────────────────── -->
<div class="modal" id="view-modal">
  <div class="view-bar" id="view-bar"></div>
  <div class="view-topbar">
    <button class="icon-btn" onclick="closeView()">←</button>
    <span id="view-title"></span>
    <button class="btn-view-edit" onclick="editViewing()">Edit</button>
    <button class="btn-view-del"  onclick="deleteViewing()">Delete</button>
  </div>
  <div id="view-body"></div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   LABELS
════════════════════════════════════════════════════════ */
const LABELS = {
  none:     { color: '#94a3b8', name: 'None'     },
  idea:     { color: '#f59e0b', name: 'Idea'     },
  work:     { color: '#3b82f6', name: 'Work'     },
  diy:      { color: '#f97316', name: 'DIY'      },
  personal: { color: '#a855f7', name: 'Personal' },
  health:   { color: '#22c55e', name: 'Health'   },
  shopping: { color: '#ec4899', name: 'Shopping' },
  travel:   { color: '#14b8a6', name: 'Travel'   },
  finance:  { color: '#6366f1', name: 'Finance'  },
};

/* ════════════════════════════════════════════════════════
   INDEXEDDB
════════════════════════════════════════════════════════ */
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('cleanslate', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('notes')) {
        const s = d.createObjectStore('notes', { keyPath: 'id', autoIncrement: true });
        s.createIndex('createdAt', 'createdAt');
        s.createIndex('label', 'label');
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = rej;
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx  = db.transaction('notes', 'readonly');
    const req = tx.objectStore('notes').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = rej;
  });
}

function dbPut(note) {
  return new Promise((res, rej) => {
    const tx  = db.transaction('notes', 'readwrite');
    const req = note.id ? tx.objectStore('notes').put(note)
                        : tx.objectStore('notes').add(note);
    req.onsuccess = () => res(req.result);
    req.onerror   = rej;
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    db.transaction('notes', 'readwrite').objectStore('notes').delete(id).onsuccess = res;
  });
}

/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
let editing    = null;
let edImages   = [];
let viewing    = null;
let previewing = false;
let filterLabel = 'all';
let sortMode   = 'newest'; // 'newest' | 'oldest' | 'label'

/* ════════════════════════════════════════════════════════
   FILTER PILLS
════════════════════════════════════════════════════════ */
function buildFilterPills() {
  const pills = document.getElementById('filter-pills');
  const allPill = `<button class="filter-pill ${filterLabel === 'all' ? 'active' : ''}"
    style="${filterLabel === 'all' ? 'background:#1e293b;border-color:#1e293b' : ''}"
    data-tag="all" onclick="setFilter('all')">All</button>`;

  const labelPills = Object.entries(LABELS)
    .filter(([k]) => k !== 'none')
    .map(([k, v]) => {
      const active = filterLabel === k;
      return `<button class="filter-pill ${active ? 'active' : ''}"
        style="${active ? `background:${v.color};border-color:${v.color}` : ''}"
        data-tag="${k}" onclick="setFilter('${k}')">
        <span class="pill-dot" style="background:${v.color}"></span>${v.name}
      </button>`;
    }).join('');

  pills.innerHTML = allPill + labelPills;
}

function setFilter(tag) {
  filterLabel = tag;
  buildFilterPills();
  renderCards();
}

/* ════════════════════════════════════════════════════════
   SORT
════════════════════════════════════════════════════════ */
const SORT_STATES = [
  { key: 'newest', label: '↓ Newest' },
  { key: 'oldest', label: '↑ Oldest' },
  { key: 'label',  label: '🏷 Label'  },
];

function cycleSort() {
  const idx = SORT_STATES.findIndex(s => s.key === sortMode);
  sortMode  = SORT_STATES[(idx + 1) % SORT_STATES.length].key;
  document.getElementById('sort-btn').textContent =
    SORT_STATES.find(s => s.key === sortMode).label;
  renderCards();
}

function applySort(notes) {
  const copy = [...notes];
  if (sortMode === 'newest') return copy.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (sortMode === 'oldest') return copy.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  if (sortMode === 'label')  return copy.sort((a, b) => {
    const la = LABELS[a.label]?.name || 'None';
    const lb = LABELS[b.label]?.name || 'None';
    return la.localeCompare(lb) || new Date(b.createdAt) - new Date(a.createdAt);
  });
  return copy;
}

/* ════════════════════════════════════════════════════════
   CARD LIST
════════════════════════════════════════════════════════ */
async function renderCards() {
  let notes = await dbGetAll();

  // Filter by label
  if (filterLabel !== 'all') {
    notes = notes.filter(n => n.label === filterLabel);
  }

  // Filter by search
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  if (q) notes = notes.filter(n => (n.title + ' ' + n.content).toLowerCase().includes(q));

  // Sort
  notes = applySort(notes);

  const el = document.getElementById('cards-list');

  if (!notes.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🪨</div>
      <div class="empty-msg">${q ? 'No notes match your search.'
        : filterLabel !== 'all' ? `No <strong>${LABELS[filterLabel]?.name}</strong> notes yet.`
        : 'No notes yet.<br>Tap <strong>+</strong> to create one.'}</div>
    </div>`;
    return;
  }

  el.innerHTML = notes.map(n => {
    const lbl   = LABELS[n.label] || LABELS.none;
    const isLabelled = n.label && n.label !== 'none';
    const barBg = isLabelled ? lbl.color : 'var(--border)';
    const title   = escH(n.title || firstLine(n.content) || 'Untitled');
    const preview = escH(n.title ? stripMd(n.content) : stripMd(n.content).slice(0, 120));
    const thumbs  = (n.images || []).slice(0, 3)
                    .map(i => `<img class="card-thumb" src="${i.data}" alt="">`).join('');
    const badge   = isLabelled
      ? `<span class="card-label-badge" style="background:${lbl.color}">${lbl.name}</span>`
      : '';
    return `
      <div class="card" onclick="viewNote(${n.id})">
        <div class="card-bar" style="background:${barBg}"></div>
        <div class="card-body">
          <div class="card-title">${title}</div>
          ${preview ? `<div class="card-preview">${preview}</div>` : ''}
          <div class="card-footer">
            ${badge}
            <span class="card-date">${relDate(n.createdAt)}</span>
            <div class="card-thumbs">${thumbs}</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ════════════════════════════════════════════════════════
   EDITOR
════════════════════════════════════════════════════════ */
function openEditor(note = null) {
  editing    = note;
  edImages   = note ? (note.images || []).map(i => ({ ...i })) : [];
  previewing = false;

  document.getElementById('editor-label').textContent     = note ? 'Edit Note' : 'New Note';
  document.getElementById('note-title').value             = note?.title   || '';
  document.getElementById('note-content').value           = note?.content || '';
  document.getElementById('note-content').style.display  = '';
  document.getElementById('md-preview').style.display    = 'none';
  document.getElementById('preview-btn').textContent     = 'Preview';

  buildLabelGrid(note?.label || 'none');
  renderEdImages();
  document.getElementById('editor-modal').classList.add('open');
  setTimeout(() => document.getElementById('note-content').focus(), 350);
}

function closeEditor() {
  document.getElementById('editor-modal').classList.remove('open');
  editing  = null;
  edImages = [];
}

/* ── Label grid ──────────────────────────────────────── */
function buildLabelGrid(sel) {
  document.getElementById('label-grid').innerHTML =
    Object.entries(LABELS).map(([k, v]) =>
      `<div class="label-chip ${k === sel ? 'active' : ''}"
        data-label="${k}"
        style="background:${v.color}"
        onclick="pickLabel('${k}')">${v.name}</div>`
    ).join('');
}

function pickLabel(key) {
  document.querySelectorAll('.label-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.label-chip[data-label="${key}"]`).classList.add('active');
}

function getLabel() {
  const sel = document.querySelector('.label-chip.active');
  return sel ? sel.dataset.label : 'none';
}

/* ── Save ────────────────────────────────────────────── */
async function saveNote() {
  const title   = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  const label   = getLabel();

  if (!title && !content && !edImages.length) {
    alert('Nothing to save — write something first.');
    return;
  }

  const note = {
    ...(editing?.id ? { id: editing.id } : {}),
    title,
    content,
    label,
    images:    edImages,
    createdAt: editing?.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };

  await dbPut(note);
  closeEditor();
  renderCards();
}

/* ── Preview toggle ──────────────────────────────────── */
function togglePreview() {
  previewing = !previewing;
  const ta  = document.getElementById('note-content');
  const pre = document.getElementById('md-preview');
  const btn = document.getElementById('preview-btn');
  if (previewing) {
    pre.innerHTML = renderMd(ta.value, edImages);
    ta.style.display  = 'none';
    pre.style.display = '';
    btn.textContent   = 'Edit';
  } else {
    ta.style.display  = '';
    pre.style.display = 'none';
    btn.textContent   = 'Preview';
  }
}

/* ── Markdown toolbar ────────────────────────────────── */
function insertMd(before, after) {
  const ta    = document.getElementById('note-content');
  const start = ta.selectionStart;
  const end   = ta.selectionEnd;
  const sel   = ta.value.substring(start, end);
  ta.value    = ta.value.substring(0, start) + before + sel + after + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + before.length;
  ta.selectionEnd   = start + before.length + sel.length;
}

/* ════════════════════════════════════════════════════════
   IMAGES
════════════════════════════════════════════════════════ */
function handleFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => addImage(ev.target.result, f.type);
  r.readAsDataURL(f);
  e.target.value = '';
}

async function pasteClipboard() {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      const t = item.types.find(x => x.startsWith('image/'));
      if (t) {
        const blob = await item.getType(t);
        const r = new FileReader();
        r.onload = ev => addImage(ev.target.result, t);
        r.readAsDataURL(blob);
        return;
      }
    }
    alert('No image found in clipboard.');
  } catch {
    alert('Clipboard paste requires HTTPS.\nUse "File" or "Camera" instead, or host the app online.');
  }
}

function addImage(dataUrl, mime) {
  const id  = 'i' + Date.now() + Math.random().toString(36).slice(2, 7);
  edImages.push({ id, data: dataUrl, mime });
  const ta  = document.getElementById('note-content');
  const pos = ta.selectionStart ?? ta.value.length;
  ta.value  = ta.value.substring(0, pos) + `\n![image](img:${id})\n` + ta.value.substring(pos);
  renderEdImages();
}

function removeImage(id) {
  edImages = edImages.filter(i => i.id !== id);
  const ta = document.getElementById('note-content');
  ta.value = ta.value.replace(new RegExp(`\\n?!\\[image\\]\\(img:${id}\\)\\n?`, 'g'), '');
  renderEdImages();
}

function renderEdImages() {
  document.getElementById('editor-images').innerHTML =
    edImages.map(i => `
      <div class="eimg-wrap">
        <img src="${i.data}" alt="">
        <button class="eimg-del" onclick="removeImage('${i.id}')">×</button>
      </div>`
    ).join('');
}

/* ════════════════════════════════════════════════════════
   VIEW NOTE
════════════════════════════════════════════════════════ */
async function viewNote(id) {
  const all = await dbGetAll();
  viewing   = all.find(n => n.id === id);
  if (!viewing) return;

  const lbl = LABELS[viewing.label] || LABELS.none;
  const isLabelled = viewing.label && viewing.label !== 'none';

  document.getElementById('view-bar').style.background = isLabelled ? lbl.color : 'var(--border)';
  document.getElementById('view-title').textContent    = viewing.title || longDate(viewing.createdAt);

  const labelBadge = isLabelled
    ? `<span style="display:inline-block;background:${lbl.color};color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px">${lbl.name}</span>`
    : '';

  document.getElementById('view-body').innerHTML = `
    <p id="view-date">${longDate(viewing.createdAt)}</p>
    ${labelBadge}
    <div class="md-render">${renderMd(viewing.content || '', viewing.images)}</div>
  `;

  document.getElementById('view-modal').classList.add('open');
}

function closeView() {
  document.getElementById('view-modal').classList.remove('open');
  viewing = null;
}

function editViewing() {
  const n = viewing;
  closeView();
  setTimeout(() => openEditor(n), 300);
}

async function deleteViewing() {
  if (!viewing || !confirm('Delete this note? This cannot be undone.')) return;
  await dbDelete(viewing.id);
  closeView();
  renderCards();
}

/* ════════════════════════════════════════════════════════
   EXPORT
════════════════════════════════════════════════════════ */
async function exportMarkdown() {
  let all = await dbGetAll();
  all = applySort(all);
  if (!all.length) { alert('No notes to export.'); return; }

  const lines = [
    '# CleanSlate Export',
    `*Exported ${new Date().toLocaleString()}*`,
    '',
  ];

  let currentLabel = null;
  for (const n of all) {
    const lbl = LABELS[n.label]?.name || 'None';
    if (sortMode === 'label' && lbl !== currentLabel) {
      currentLabel = lbl;
      lines.push(`## ${lbl}`, '');
    }
    lines.push('---', '');
    if (n.title) lines.push(`# ${n.title}`, '');
    lines.push(`*${longDate(n.createdAt)}*`);
    if (n.label && n.label !== 'none') lines.push(`*Label: ${lbl}*`);
    lines.push('');

    let body = n.content || '';
    for (const img of (n.images || [])) {
      body = body.replace(new RegExp(`img:${img.id}`, 'g'), img.data);
    }
    lines.push(body, '');
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), {
    href: url,
    download: `cleanslate-${new Date().toISOString().slice(0, 10)}.md`
  }).click();
  URL.revokeObjectURL(url);
}

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function renderMd(text, images = []) {
  let md = text;
  for (const img of images) md = md.replace(new RegExp(`img:${img.id}`, 'g'), img.data);
  return marked.parse(md);
}

function firstLine(t = '') {
  return t.split('\n').map(l => l.trim()).find(Boolean) || '';
}

function stripMd(t = '') {
  return t
    .replace(/!\[.*?\]\(.*?\)/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/(\*\*|__)(.*?)\1/g, '$2')
    .replace(/(\*|_)(.*?)\1/g, '$2')
    .replace(/~~(.*?)~~/g, '$1')
    .replace(/`+([^`]+)`+/g, '$1')
    .replace(/^\s*[-*+>]\s/gm, '')
    .replace(/^\s*\d+\.\s/gm, '')
    .replace(/\n+/g, ' ')
    .trim();
}

function relDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), diff = Date.now() - d;
  if (diff < 60e3)    return 'just now';
  if (diff < 3600e3)  return Math.floor(diff / 60e3)   + 'm ago';
  if (diff < 86400e3) return Math.floor(diff / 3600e3)  + 'h ago';
  if (diff < 7*86400e3) return Math.floor(diff / 86400e3) + 'd ago';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function longDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function escH(s = '') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
